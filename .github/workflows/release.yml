name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles app"
          - platform: "ubuntu-latest"
            args: "--bundles appimage"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install app dependencies
        run: bun install

      - name: audit dependencies
        run: bun audit

      - name: Build & Release (macOS / Linux)
        if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: ${{ matrix.platform == 'ubuntu-latest' }}

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: bun run tauri build --no-bundle

      - name: Zip Windows Binary
        if: matrix.platform == 'windows-latest'
        run: Compress-Archive -Path src-tauri/target/release/spive2d.exe -DestinationPath spive2d-windows.zip

      - name: Upload Windows Zip
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$env:TAG_NAME" >$null 2>&1
          if ($LASTEXITCODE -ne 0) {
              gh release create "$env:TAG_NAME" --generate-notes
          }
          gh release upload "$env:TAG_NAME" spive2d-windows.zip --clobber
