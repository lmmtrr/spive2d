name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles app"
          - platform: "ubuntu-latest"
            args: "--bundles appimage"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905813e85d991b96f13b0a2df3d80a1 # v2.10.2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: setup bun
        uses: oven-sh/setup-bun@403470cc170e83b483da59a358c27e8a939f0464 # v2.0.1

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@eb20067341355c707577579626359521360e28cf
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install app dependencies
        run: bun install --frozen-lockfile

      - name: audit JS dependencies
        run: bun audit

      - name: audit Rust dependencies
        uses: actions-rust-lang/audit@109923831f280a5e8e895c1d6830501865241776 # v1.1.0

      - name: Build & Release (macOS / Linux)
        if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@694f877684c3c3a91b48b6348956b668b55e347d # v0.5.15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: ${{ matrix.platform == 'ubuntu-latest' }}

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: bun run tauri build --no-bundle

      - name: Zip Windows Binary
        if: matrix.platform == 'windows-latest'
        run: Compress-Archive -Path src-tauri/target/release/spive2d.exe -DestinationPath spive2d-windows.zip

      - name: Upload Windows Zip
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$env:TAG_NAME" >$null 2>&1
          if ($LASTEXITCODE -ne 0) {
              gh release create "$env:TAG_NAME" --generate-notes
          }
          gh release upload "$env:TAG_NAME" spive2d-windows.zip --clobber
